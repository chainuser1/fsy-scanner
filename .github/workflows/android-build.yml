name: CI / Android Build (Flutter)
# Version: 2.0.0

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    name: CI checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: fsy_scanner

      - name: Create placeholder .env for analyze
        run: |
          echo "GOOGLE_SERVICE_ACCOUNT_EMAIL=test@example.com" > assets/.env
          echo "GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY=fake" >> assets/.env
          echo "SHEETS_ID=fake" >> assets/.env
          echo "SHEETS_TAB=fake" >> assets/.env
          echo "EVENT_NAME=Test" >> assets/.env
        working-directory: fsy_scanner

      - name: Dart analyze (linting)
        run: flutter analyze
        working-directory: fsy_scanner

      - name: Format check
        run: dart format --set-exit-if-changed lib/
        working-directory: fsy_scanner

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request'
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Flutter dependencies
        run: flutter pub get
        working-directory: fsy_scanner

      - name: Create .env file from secrets
        run: |
          echo "GOOGLE_SERVICE_ACCOUNT_EMAIL=${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}" > assets/.env
          echo "GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY=${{ secrets.GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY }}" >> assets/.env
          echo "SHEETS_ID=${{ secrets.SHEETS_ID }}" >> assets/.env
          echo "SHEETS_TAB=${{ secrets.SHEETS_TAB }}" >> assets/.env
          echo "EVENT_NAME=${{ secrets.EVENT_NAME }}" >> assets/.env
          echo ".env created (values hidden)"
        working-directory: fsy_scanner

      - name: Build Android APK (debug)
        run: flutter build apk --target-platform android-arm64 --debug
        working-directory: fsy_scanner

      - name: Build Android APK (release)
        run: flutter build apk --target-platform android-arm64 --release
        working-directory: fsy_scanner

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: fsy-scanner-debug
          path: fsy_scanner/build/app/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: fsy-scanner-release
          path: fsy_scanner/build/app/outputs/apk/release/app-release.apk
          retention-days: 30
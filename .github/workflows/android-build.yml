name: CI / Android Release

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  ci:
    name: CI checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: fsy-scanner/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('fsy-scanner/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci
        working-directory: fsy-scanner

      - name: Run TypeScript check
        run: npx tsc --noEmit
        working-directory: fsy-scanner

      - name: Run Expo doctor
        run: npx expo-doctor
        working-directory: fsy-scanner

  build-android:
    name: Build Android release
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request'
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: fsy-scanner/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('fsy-scanner/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Android SDK command-line tools
        run: |
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          curl -L -o /tmp/commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q /tmp/commandlinetools.zip -d /tmp/cmdline-tools
          mv /tmp/cmdline-tools/cmdline-tools "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" --licenses
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Install dependencies
        run: npm ci
        working-directory: fsy-scanner

      - name: Verify app version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG_NO_PREFIX="${TAG#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          APP_VERSION=$(node -p "require('./app.json').expo.version")
          echo "Tag: $TAG"
          echo "Normalized tag: $TAG_NO_PREFIX"
          echo "package.json version: $PACKAGE_VERSION"
          echo "app.json version: $APP_VERSION"
          if [ "$PACKAGE_VERSION" != "$TAG_NO_PREFIX" ] || [ "$APP_VERSION" != "$TAG_NO_PREFIX" ]; then
            echo "Version mismatch: expected $TAG_NO_PREFIX"
            exit 1
          fi
        working-directory: fsy-scanner

      - name: Prebuild Android
        run: npx expo prebuild --platform android --no-install
        working-directory: fsy-scanner

      - name: Build Android release
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease
        working-directory: fsy-scanner

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: fsy-scanner/android/app/build/outputs/apk/release/app-release.apk

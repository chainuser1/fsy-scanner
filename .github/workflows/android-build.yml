name: CI / Android Build (Flutter)
# Version: 2.1.0

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    name: CI checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: fsy_scanner

      - name: Create placeholder .env for analyze
        run: |
          echo "GOOGLE_SERVICE_ACCOUNT_EMAIL=test@example.com" > assets/.env
          echo "GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY=fake" >> assets/.env
          echo "SHEETS_ID=fake" >> assets/.env
          echo "SHEETS_TAB=fake" >> assets/.env
          echo "EVENT_NAME=Test" >> assets/.env
        working-directory: fsy_scanner

      - name: Dart analyze (linting)
        run: flutter analyze
        working-directory: fsy_scanner

      - name: Format check
        run: dart format --set-exit-if-changed lib/
        working-directory: fsy_scanner

  build-android:
    name: Build Android APK (debug)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request'
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Flutter dependencies
        run: flutter pub get
        working-directory: fsy_scanner

      - name: Create .env file from secrets (Python)
        run: |
          python3 -c "
          import os

          def escape_val(v):
              # Wrap in double quotes; escape backslashes and internal double quotes
              # This safely handles multi-line values like RSA private keys
              v = v.replace('\\\\', '\\\\\\\\')
              v = v.replace('\"', '\\\\\"')
              return '\"' + v + '\"'

          keys = [
              'GOOGLE_SERVICE_ACCOUNT_EMAIL',
              'GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY',
              'SHEETS_ID',
              'SHEETS_TAB',
              'EVENT_NAME',
          ]

          with open('assets/.env', 'w') as f:
              for k in keys:
                  v = os.environ.get(k, '')
                  f.write(f'{k}={escape_val(v)}\n')

          print('.env created successfully')
          "
        working-directory: fsy_scanner
        env:
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY }}
          SHEETS_ID: ${{ secrets.SHEETS_ID }}
          SHEETS_TAB: ${{ secrets.SHEETS_TAB }}
          EVENT_NAME: ${{ secrets.EVENT_NAME }}

      - name: Verify .env file integrity
        run: |
          FILE="assets/.env"

          if [ ! -f "$FILE" ]; then
            echo "ERROR: .env file was not created!"
            exit 1
          fi

          if [ ! -s "$FILE" ]; then
            echo "ERROR: .env file is empty!"
            exit 1
          fi

          echo "Checking required keys and non-empty values..."
          MISSING=""
          for key in GOOGLE_SERVICE_ACCOUNT_EMAIL GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY SHEETS_ID SHEETS_TAB EVENT_NAME; do
            VALUE=$(grep "^${key}=" "$FILE" | cut -d'=' -f2-)
            if [ -z "$VALUE" ] || [ "$VALUE" = '""' ]; then
              MISSING="$MISSING $key"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo "ERROR: Missing or empty keys in .env:$MISSING"
            exit 1
          fi

          echo "All required keys present and non-empty"
          echo "File size: $(wc -c < $FILE) bytes"
        working-directory: fsy_scanner

      - name: Build Android APK (debug)
        run: flutter build apk --target-platform android-arm64 --debug
        working-directory: fsy_scanner

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: fsy-scanner-debug
          path: fsy_scanner/build/app/outputs/apk/debug/app-debug.apk
          retention-days: 30
name: CI / Android Build

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  ci:
    name: CI checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: fsy-scanner/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('fsy-scanner/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci
        working-directory: fsy-scanner

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: fsy-scanner

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request'
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: fsy-scanner/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('fsy-scanner/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install Android SDK components
        run: |
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          curl -L -o /tmp/commandlinetools.zip \
            https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q /tmp/commandlinetools.zip -d /tmp/cmdline-tools
          mv /tmp/cmdline-tools/cmdline-tools "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            --sdk_root="$ANDROID_SDK_ROOT" --licenses
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.1.12297006"

      - name: Install dependencies
        run: npm ci
        working-directory: fsy-scanner

      - name: Create .env file from secrets
        run: |
          cat > .env << EOF
          GOOGLE_SERVICE_ACCOUNT_EMAIL=${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY=${{ secrets.GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY }}
          EXPO_PUBLIC_SHEETS_ID=${{ secrets.EXPO_PUBLIC_SHEETS_ID }}
          EXPO_PUBLIC_SHEETS_TAB=${{ secrets.EXPO_PUBLIC_SHEETS_TAB }}
          EXPO_PUBLIC_EVENT_NAME=${{ secrets.EXPO_PUBLIC_EVENT_NAME }}
          EOF
          echo ".env created (values hidden)"
        working-directory: fsy-scanner

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean --no-install
        working-directory: fsy-scanner

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
        working-directory: fsy-scanner

      - name: Set Gradle JDK
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
        working-directory: fsy-scanner

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace
        working-directory: fsy-scanner

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fsy-scanner-debug
          path: fsy-scanner/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30